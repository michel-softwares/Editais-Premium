name: Build catalog

on:
  push:
    branches: [main]
    paths:
      - '**.txt'
      - '**.json'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.webp'
      - 'scripts/build-catalog.mjs'
      - '.github/workflows/build-catalog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-catalog.mjs . catalog.json
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza catalogo de editais"
